version: '3.9'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      # POSTGRES_USER: postgres
      # POSTGRES_PASSWORD: password
      POSTGRES_DB: elev8_development
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rake db:migrate && bundle exec rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/tmp
      - /app/log
      - /app/.git
      - /app/public/packs
      - /app/public/assets
      - bundle_cache:/usr/local/bundle
      
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/elev8_development
      RAILS_ENV: development
      JWT_SECRET_KEY: 5b3be9227924cd531d75975df2cc2812dad141f686c5

  test:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rspec"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
    environment:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@db:5432/elev8_test
      JWT_SECRET_KEY: 4e17dde82b8e7f5e93de9af37e6821fb2004b8ded004

volumes:
  bundle_cache:
  postgres_data:
